<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PID Pilot</title>
    <meta
      name="description"
      content="PID Pilot is a drop-in PIDF tuning library for FTC with one-button relay auto-tune for flywheels, arms, and elevators."
    />
    <script>
      // Apply the persisted/system theme before first paint to avoid a flash.
      (() => {
        try {
          const stored = window.localStorage.getItem("pid-pilot-theme");
          const theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          const root = document.documentElement;
          root.classList.toggle("dark", theme === "dark");
          root.dataset.theme = theme;
          root.style.colorScheme = theme;
        } catch (_error) {
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
    <script type="module" crossorigin src="/docs/assets/index-BVu0zXTi.js"></script>
    <link rel="stylesheet" crossorigin href="/docs/assets/styles-j4My0vT5.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
